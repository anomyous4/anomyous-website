name: cifar100n
domain: computer vision
subdomain: Noisy-Label Learning
description: |
  Build an image classifier for CIFAR-100N, a variant of CIFAR-100 where training labels contain ~40% real-world human annotation noise (collected via Amazon Mechanical Turk). The test set has clean (correct) labels. The challenge is to achieve high accuracy despite severe label noise.

  ## Data Format
  Training data is at $FARBENCH_DATA_DIR (/data in container):
    - train.pt: dict with keys "images" (uint8 tensor, shape [N, 3, 32, 32]) and "labels" (int64 tensor, shape [N]) — labels contain ~40% noise
    - val.pt:   same format as train.pt — labels also contain ~40% noise

  N is ~45,000 for train and ~5,000 for val. Images are raw pixel values 0-255 (uint8), in CHW format. Labels are integers 0-99, but approximately 40% are incorrect human annotations. The noise is instance-dependent (harder images are more likely to be mislabeled).

  ## Predict Script Contract
  You must create a predict.py that accepts these arguments:
    python predict.py --data_path <test_data_dir> --checkpoint <model_checkpoint> --output <output.json>

  Input: test_data_dir contains test.pt with same format as train.pt (images + labels).
         Your script should ONLY use the "images" key (labels are ground truth).
  Output: JSON file with format {"predictions": [42, 7, 99, 0, ...]}
          One predicted class index (int 0-99) per test sample, in order.

compute_type: gpu

# Paths
script_dir: script/
data_dir: /rab_data/cifar100n/
test_data_dir: /rab_data/cifar100n_test/
docker_image: farbench/farbench:cifar100n-cu118

# Evaluation
primary_metric: accuracy
higher_is_better: true
evaluator_class: benchmarks.cifar100n.script.evaluator.CIFAR100NEvaluator

eval_contract:
  predict_script: predict.py
  invocation: "python predict.py --data_path <test_data_dir> --checkpoint <ckpt> --output <output.json>"
  input_format: "test.pt containing {'images': uint8 [N,3,32,32], 'labels': int64 [N]}"
  output_format: '{"predictions": [42, 7, 99, 0, ...]}'

# Constraints
# budget-review 2026-04-20: CIFAR-100N (50k 32x32) noisy labels, ResNet/WRN + noise-robust methods, 1 GPU 2h allows multiple runs. Keep.
max_gpu_count: 1
total_time_budget_hours: 5
max_iterations: 30
network_access: false

agent_hints: |
  Pre-installed task packages (do NOT reinstall): cleanlab

  Pre-downloaded pretrained models (no network needed):
    - CLIP ViT-B/16 (86M) — via timm: timm.create_model('vit_base_patch16_clip_224.openai', pretrained=True)
    - torchvision: resnet50 (IMAGENET1K_V2, 25M) — torchvision.models.resnet50(weights='IMAGENET1K_V2')
    - timm: convnext_tiny.fb_in22k_ft_in1k (28M) — timm.create_model('convnext_tiny.fb_in22k_ft_in1k', pretrained=True)
